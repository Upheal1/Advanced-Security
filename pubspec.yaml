name: upheal
description: A Flutter mental health gamification app
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  package_info_plus: ^9.0.0
  google_fonts: ^6.3.3
  fl_chart: ^1.1.1
  lucide_icons: ^0.257.0

  provider: ^6.1.1
  shared_preferences: ^2.2.2
  url_launcher: ^6.3.2
  sqflite: ^2.3.0
  path: ^1.9.1
  usage_stats: ^1.3.0
  permission_handler: ^12.0.1
  device_info_plus: ^12.3.0
  intl: ^0.20.2
  flutter_local_notifications: ^19.5.0
  timezone: ^0.10.0
  confetti: ^0.8.0
  lottie: ^3.3.2
  animated_text_kit: ^4.2.2
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  flutter_secure_storage: ^9.0.0
  mailer: ^6.6.0
  crypto: ^3.0.6
  local_auth: ^3.0.0
  sensors_plus: ^7.0.0
  pedometer: ^4.0.0
  dtd: ^4.0.0
  flutter_lints: ^6.0.0
  json_rpc_2: ^4.0.0
  stack_trace: ^1.12.1
  web: ^1.1.1
  http: ^1.2.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  dio: ^5.4.0
  share_plus: ^7.2.1
  path_provider: ^2.1.1
  o3d: ^3.1.3
  supabase_flutter: ^2.12.4
  image_picker: ^1.2.2
  mime: ^1.0.6
  # workmanager: ^0.5.2  # Temporarily disabled due to compatibility issues

dev_dependencies:
  flutter_test:
    sdk: flutter
  fake_async: ^1.3.1
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    # 3D Traveler GLB for lib/widgets/traveler_viewer.dart (also covered by assets/)
    - assets/traveler.glb
    - assets/
    - assets/icon/
    - assets/avatar/
    - assets/avatar/baby_boy/
    - assets/avatar/baby_girl/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#ffffff"
    theme_color: "#7C3AED"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#7C3AED"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true

